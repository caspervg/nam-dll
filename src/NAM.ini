; Optional configuration file for the NAM.dll, allowing to disable individual
; features for debugging purposes.
; Lines starting with semicolons are comments.
; Supported values: true or false. Unless stated otherwise, all features are activated by default.
[Admin]
; Setting this to false stops the game from loading the DLL.
Enabled=true
[NAM]
; draggable diagonal Streets
EnableDiagonalStreets=true
; no more autoconnect for Streets and RHW
DisableAutoconnect=true
; activate tunnels for Street, RHW and Lightrail
EnableTunnels=true
; reduce ferry clearance height of bridges
ReduceFerryBridgeHeight=true
; make override networks much more stable and improve performance
EnableRUL2EnginePatch=true
; slope tolerance fixes for curves and FLEX puzzle pieces
EnableNetworkSlopePatch=true
; better control for placing down FLEX puzzle pieces
EnableFlexPuzzlePiecePatch=true
; prevent eternal commuter loops between neighboring cities
EnableCommuteLoopPatch=true
; allow zones to develop along RHW networks (default: false)
EnableDirtRoadAccessPatch=false
; experimental adjacent-carriageway handling for RHW neighbor connections (default: false)
EnableRHWNeighborConnectionPatch=false
; subpatch of the RHW neighbor connection patch: allow OWR neighbor connections as RHW/DirtRoad type (default: false)
EnableOWRNeighborConnectionSubpatch=false
; subpatch of the RHW neighbor connection patch: RHW-style return search for one-way Road/NWM neighbor connections (default: false)
EnableNWMNeighborConnectionSubpatch=false
; maximum distance along the city edge when looking for the opposite RHW carriageway
RHWNeighborConnectionMaxSearchDistance=8
; maximum empty-tile gap between carriageway bands in one collector-express group
RHWNeighborConnectionMaxGroupingGap=2
; log up to 256 RHW direction classifications and pairing decisions (default: false)
EnableRHWNeighborConnectionDebugLogging=false
; keyboard shortcuts for Monorail, Onewayroad, Groundhighway and RHW
EnableKeyboardShortcuts=true
